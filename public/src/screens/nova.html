<section class="card tx-entry-card">
  <div class="tx-entry-hero">
    <div>
      <p class="tx-entry-eyebrow">Registo r&aacute;pido</p>
      <h2 class="section-title">Nova transa&ccedil;&atilde;o</h2>
    </div>
    <button id="tx-demo-status" class="tx-demo-status hidden" type="button">
      Modo demo
    </button>
  </div>

  <div class="tx-type-segment">
    <label class="btn tx-type-option tx-type-option--expense">
      <input type="radio" name="tx-type" value="EXPENSE" checked />
      <span class="material-symbols-outlined" aria-hidden="true">south_west</span>
      <span>Despesa</span>
    </label>
    <label class="btn tx-type-option tx-type-option--income">
      <input type="radio" name="tx-type" value="INCOME" />
      <span class="material-symbols-outlined" aria-hidden="true">north_east</span>
      <span>Receita</span>
    </label>
    <label class="btn tx-type-option tx-type-option--savings">
      <input type="radio" name="tx-type" value="SAVINGS" />
      <span class="material-symbols-outlined" aria-hidden="true">savings</span>
      <span>Poupan&ccedil;a</span>
    </label>
  </div>

  <div class="tx-quick-grid">
    <label class="tx-amount-field">Valor
      <input id="tx-amount" type="number" step="0.01" inputmode="decimal" placeholder="0,00" />
    </label>
    <label>Data
      <input id="tx-date" type="date" />
    </label>
  </div>

  <div id="row-account-single" class="grid" style="grid-template-columns: 1fr; gap: 10px; margin-top: 10px">
    <label>Conta
      <select id="tx-account"></select>
    </label>
  </div>

  <div id="row-account-transfer" class="grid hidden"
    style="grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px">
    <label>De
      <select id="tx-account-from"></select>
    </label>
    <label>Para
      <select id="tx-account-to"></select>
    </label>
  </div>

  <div id="row-category" style="margin-top: 10px">
    <div id="tx-cat-wrap">
      <div class="tx-category-grid">
        <label>Categoria
          <select id="cat-parent"></select>
        </label>
        <label>Subcategoria (opcional)
          <select id="cat-child"></select>
        </label>
      </div>
      <input type="hidden" id="tx-category-final" />
    </div>
  </div>

  <label style="margin-top: 10px">Descri&ccedil;&atilde;o
    <input id="tx-desc" type="text" placeholder="ex.: supermercado, almo&ccedil;o, renda..." />
  </label>

  <div id="row-nature" class="grid hidden" style="grid-template-columns: 1fr; gap: 10px; margin-top: 10px">
    <label>Natureza da despesa</label>
    <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 8px">
      <label class="btn" style="display: flex; align-items: center; gap: 8px">
        <input type="radio" name="tx-nature" value="fixed" />
        <span>Fixas (habituais)</span>
      </label>
      <label class="btn" style="display: flex; align-items: center; gap: 8px">
        <input type="radio" name="tx-nature" value="variable" />
        <span>Vari&aacute;veis (ocasionais)</span>
      </label>
    </div>
  </div>

  <button id="btn-fixed-bulk" class="btn fab-extended hidden" type="button">
    <svg aria-hidden="true" width="20" height="20">
      <use href="#i-plus"></use>
    </svg>
    <span>Despesas r&aacute;pidas</span>
  </button>

  <div class="tx-suggestions" aria-label="Sugest&otilde;es r&aacute;pidas">
    <button class="tx-chip" type="button" data-desc="Supermercado" data-cat="supermercado">Supermercado</button>
    <button class="tx-chip" type="button" data-desc="Almoco" data-cat="restaurante">Almo&ccedil;o</button>
    <button class="tx-chip" type="button" data-desc="Combustivel" data-cat="combustivel">Combust&iacute;vel</button>
    <button class="tx-chip" type="button" data-desc="Farmacia" data-cat="saude">Farm&aacute;cia</button>
  </div>

  <details class="tx-more-options">
    <summary>Mais op&ccedil;&otilde;es</summary>

    <div class="grid" style="
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        margin-top: 10px;
      ">
      <label>Regularidade
        <select id="tx-regularity"></select>
      </label>
      <label>M&eacute;todo
        <select id="tx-method"></select>
      </label>
      <label>Estado
        <select id="tx-status"></select>
      </label>
    </div>

    <label>Localiza&ccedil;&atilde;o
      <input id="tx-loc" type="text" placeholder="Opcional" />
    </label>

    <label>Notas
      <textarea id="tx-notes" rows="3" placeholder="opcional"></textarea>
    </label>
  </details>

  <div id="tx-msg" class="card" style="margin-top: 10px; display: none"></div>
  <div class="tx-actions">
    <button id="tx-save" class="btn btn--primary">Guardar despesa</button>
    <button id="tx-clear" class="btn">Limpar</button>
  </div>
</section>

<div id="fixed-bulk-modal" class="modal" hidden>
  <div class="modal__card" style="
      display: flex;
      flex-direction: column;
      max-height: 85vh;
      padding: 0;
      overflow: hidden;
    ">
    <header class="modal__header" style="
        flex-shrink: 0;
        padding: 16px;
        border-bottom: 1px solid var(--border);
      ">
      <h3 class="modal__title">Despesas fixas frequentes</h3>
      <button class="modal__close" type="button" aria-label="Fechar">x</button>
    </header>

    <div class="modal__body" style="flex: 1; overflow-y: auto; padding: 16px">
      <p class="row-note" style="margin-bottom: 12px">
        Confirma os valores para este m&ecirc;s.
      </p>

      <div id="fixed-bulk-list" class="bulk-list"></div>
    </div>

    <footer class="modal__footer" style="
        flex-shrink: 0;
        padding: 12px 16px;
        background: var(--bg-card);
        border-top: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      ">
      <div style="font-size: 0.9em">
        <div style="color: var(--text-sec)">Selecionado</div>
        <strong id="fixed-bulk-total" style="font-size: 1.1em; color: var(--primary)">EUR 0,00</strong>
      </div>
      <div style="display: flex; gap: 10px">
        <button class="btn" id="fixed-bulk-cancel" type="button">
          Cancelar
        </button>
        <button class="btn btn--primary" id="fixed-bulk-confirm" type="button">
          Registar
        </button>
      </div>
    </footer>
  </div>
</div>
